<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380" fill="none">
  <!-- 背景 -->
  <rect width="400" height="380" fill="#f5f0eb" rx="16"/>

  <!-- 千葉県の薄いアウトライン（背景） -->
  <g opacity="0.15">
    <rect x="20" y="20" width="360" height="340" rx="8" fill="#41b9af"/>
  </g>

  <!-- 印西市（北西） -->
  <polygon
    points="60,50 160,50 175,80 170,130 100,140 55,110"
    fill="#41b9af"
    fill-opacity="0.7"
    stroke="#ffffff"
    stroke-width="2"
  />
  <text x="110" y="100" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">印西市</text>

  <!-- 八千代市（西中央） -->
  <polygon
    points="55,110 100,140 110,195 65,210 40,170"
    fill="#41b9af"
    fill-opacity="0.7"
    stroke="#ffffff"
    stroke-width="2"
  />
  <text x="78" y="172" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">八千代市</text>

  <!-- 佐倉市（中央・強調） -->
  <polygon
    points="170,130 270,120 290,170 280,230 185,240 110,195 100,140 170,130"
    fill="#41b9af"
    fill-opacity="0.9"
    stroke="#ffffff"
    stroke-width="2.5"
  />
  <text x="195" y="188" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">佐倉市</text>
  <!-- 佐倉市に星マーク -->
  <circle cx="195" cy="162" r="8" fill="#ffffff" fill-opacity="0.9"/>
  <text x="195" y="167" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#41b9af">★</text>

  <!-- 四街道市（南西） -->
  <polygon
    points="110,195 185,240 175,295 100,290 75,250 65,210"
    fill="#41b9af"
    fill-opacity="0.7"
    stroke="#ffffff"
    stroke-width="2"
  />
  <text x="128" y="250" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">四街道市</text>

  <!-- 周辺（薄い色） -->
  <polygon
    points="270,120 340,100 360,150 340,200 290,170"
    fill="#41b9af"
    fill-opacity="0.2"
    stroke="#41b9af"
    stroke-width="1.5"
    stroke-dasharray="4,3"
  />
  <polygon
    points="280,230 340,200 360,260 330,310 250,310 185,240"
    fill="#41b9af"
    fill-opacity="0.2"
    stroke="#41b9af"
    stroke-width="1.5"
    stroke-dasharray="4,3"
  />
  <polygon
    points="175,295 250,310 230,345 140,345 100,290"
    fill="#41b9af"
    fill-opacity="0.2"
    stroke="#41b9af"
    stroke-width="1.5"
    stroke-dasharray="4,3"
  />

  <!-- 凡例 -->
  <rect x="255" y="30" width="130" height="70" rx="8" fill="white" fill-opacity="0.85"/>
  <circle cx="272" cy="52" r="7" fill="#41b9af" fill-opacity="0.9"/>
  <text x="285" y="57" font-family="sans-serif" font-size="12" fill="#333">対応エリア</text>
  <line x1="265" y1="72" x2="279" y2="72" stroke="#41b9af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="285" y="77" font-family="sans-serif" font-size="12" fill="#333">相談可能エリア</text>
  <text x="285" y="93" font-family="sans-serif" font-size="10" fill="#888">（近隣市区町村）</text>
</svg>
